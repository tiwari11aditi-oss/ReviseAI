<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviseAI - Secure Login</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box glass">
            <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:50%; display:inline-block; margin-bottom:24px; box-shadow:0 0 20px rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.2);">
                <i data-lucide="zap" style="width: 40px; height: 40px; color: #fff;"></i>
            </div>
            
            <h2 id="auth-title">Welcome Back</h2>
            
            <div id="auth-error"></div>
            
            <form id="auth-form">
                <input type="text" id="auth-username" class="auth-input" placeholder="Username" required autocomplete="off">
                <input type="password" id="auth-password" class="auth-input" placeholder="Password" required>
                <button type="submit" class="auth-btn" id="auth-submit">Sign In</button>
                <p class="auth-toggle" id="auth-switch">New here? <span>Create Account</span></p>
            </form>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
